services:
  app:
    build: .
    ports:
      - '3000:3000'
    environment:
      PORT: 3000
    depends_on:
      - due-local-postgres

  due-local-postgres:
    image: postgres:15
    restart: always
    volumes:
      - ./postgres_data:/var/lib/postgresql/data
    ports:
      - 5432:5432
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
