      "budget": 5000000,
      "personality": {
        "preparationStyle": "systematic",
        "additionalConsiderations": "Focus on quality"
      },
      "phases": [
        {
          "name": "Planning",
          "expectedStartDate": "2026-05-01",
          "expectedEndDate": "2026-05-31",
          "order": 0,
          "tasks": [
            {
              "name": "Define requirements",
              "status": "TODO",
              "order": 0
            }
          ]
        }
      ]
    }
